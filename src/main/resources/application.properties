spring.application.name=otp
# Server Configuration
server.port=8080
server.servlet.context-path=/
server.error.include-message=always

# Redis Configuration
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.password=
spring.redis.timeout=2000ms
spring.redis.jedis.pool.max-active=8
spring.redis.jedis.pool.max-idle=8
spring.redis.jedis.pool.min-idle=0

# Twilio Configuration (Replace with your actual credentials for production)
twilio.account.sid=User-Id
twilio.auth.token=User_Token
twilio.phone.number=+14788126312

# OTP Configuration
otp.length=6
otp.expiry.minutes=5
otp.max.attempts=5

# Redis Key Prefix
otp.redis.key.prefix=otp:

# Logging Configuration
logging.level.com.example.otp=DEBUG
logging.level.org.springframework.data.redis=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC